name: Deploy Digital Twin

on:
  push:
    branches:
      - main

concurrency:
  group: digital-twin-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'

  deploy-infra:
    needs: detect
    if: needs.detect.outputs.infra == 'true'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Optional: set repository variable AZURE_LOCATION (e.g. westeurope) so deploys match
      # management-group "allowed locations" policy. If unset, Terraform uses variables.tf default.
      - name: Terraform location (Azure Policy)
        run: |
          LOC='${{ vars.AZURE_LOCATION }}'
          if [ -n "$LOC" ]; then
            echo "TF_VAR_location=$LOC" >> "$GITHUB_ENV"
            echo "Using TF_VAR_location from AZURE_LOCATION."
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      # Without remote state, each job has empty state while Azure still holds resources → "already exists".
      # Add secrets TF_BACKEND_RG, TF_BACKEND_STORAGE_ACCOUNT, TF_BACKEND_ACCESS_KEY (storage account key).
      - name: Terraform Init (Azure remote state)
        env:
          TF_BACKEND_RG: ${{ secrets.TF_BACKEND_RG }}
          TF_BACKEND_STORAGE_ACCOUNT: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
          TF_BACKEND_ACCESS_KEY: ${{ secrets.TF_BACKEND_ACCESS_KEY }}
        run: |
          set -euo pipefail
          missing=
          for v in TF_BACKEND_RG TF_BACKEND_STORAGE_ACCOUNT TF_BACKEND_ACCESS_KEY; do
            eval "val=\${$v:-}"
            if [ -z "${val}" ]; then missing="${missing} ${v}"; fi
          done
          if [ -n "${missing}" ]; then
            echo "::error::Missing GitHub Actions secrets for Terraform remote state:${missing}"
            echo "Create an Azure Storage account and container for state (infra/scripts/bootstrap-remote-state.sh),"
            echo "then add secrets TF_BACKEND_RG, TF_BACKEND_STORAGE_ACCOUNT, TF_BACKEND_ACCESS_KEY."
            echo "See infra/README.md section 'Terraform remote state (CI)'."
            exit 1
          fi
          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=${TF_BACKEND_RG}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=digital-twin.terraform.tfstate" \
            -backend-config="access_key=${TF_BACKEND_ACCESS_KEY}"

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -input=false tfplan

  deploy-app:
    needs: [detect, deploy-infra]
    if: ${{ always() && (needs.deploy-infra.result == 'success' || (needs.deploy-infra.result == 'skipped' && needs.detect.outputs.infra != 'true')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Resolve static output folder
        id: static
        run: |
          if [ -d frontend/out ]; then echo "dir=out" >> "$GITHUB_OUTPUT"
          elif [ -d frontend/dist ]; then echo "dir=dist" >> "$GITHUB_OUTPUT"
          else echo "No out/ or dist/ after build" >&2; exit 1; fi

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check deploy secrets (storage + function app names)
        env:
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_FUNCTION_APP_NAME: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${AZURE_STORAGE_ACCOUNT_NAME:-}" ]; then
            echo "::error::Missing GitHub secret AZURE_STORAGE_ACCOUNT_NAME. After infra apply: cd infra && terraform output -raw storage_account_name"
            exit 1
          fi
          if [ -z "${AZURE_FUNCTION_APP_NAME:-}" ]; then
            echo "::error::Missing GitHub secret AZURE_FUNCTION_APP_NAME. After infra apply: terraform output -raw function_app_name"
            exit 1
          fi

      - name: Upload static site to '$web'
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" \
              --destination '$web' \
              --overwrite \
              --source "${{ github.workspace }}/frontend/${{ steps.static.outputs.dir }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for Functions
        working-directory: function-app
        run: pip install -r requirements.txt

      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: function-app
