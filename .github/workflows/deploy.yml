name: Deploy Digital Twin

on:
  push:
    branches:
      - main

concurrency:
  group: digital-twin-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'

  deploy-infra:
    needs: detect
    if: needs.detect.outputs.infra == 'true'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -input=false tfplan

  deploy-app:
    needs: [detect, deploy-infra]
    if: ${{ always() && (needs.deploy-infra.result == 'success' || (needs.deploy-infra.result == 'skipped' && needs.detect.outputs.infra != 'true')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Resolve static output folder
        id: static
        run: |
          if [ -d frontend/out ]; then echo "dir=out" >> "$GITHUB_OUTPUT"
          elif [ -d frontend/dist ]; then echo "dir=dist" >> "$GITHUB_OUTPUT"
          else echo "No out/ or dist/ after build" >&2; exit 1; fi

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload static site to '$web'
        uses: azure/CLI@v2
        with:
          azcliversion: azure-cli
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" \
              --destination '$web' \
              --overwrite \
              --source "${{ github.workspace }}/frontend/${{ steps.static.outputs.dir }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for Functions
        working-directory: function-app
        run: pip install -r requirements.txt

      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: function-app
